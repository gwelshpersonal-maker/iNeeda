<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iNeeda.Work | Find a Pro & Estimate Service Prices</title>
    <meta name="description" content="Find verified, local independent home and lawn care professionals near Harrisburg, Lancaster, and York PA. Estimate prices & list jobs instantly." />
    <meta name="keywords" content="Harrisburg PA, home services, local handyman, cleaning services, lawn care, landscaping Harrisburg, furniture assembly, iNeeda, local labor, PA services" />
    <link rel="canonical" href="https://ineeda.work" />

    <!-- Open Graph / OG Protocol -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="iNeeda.Work | Find registered local pros & estimate prices" />
    <meta property="og:description" content="The premier local professional directory for home & lawn care in Central PA (Harrisburg, York, Lancaster). Free cost calculations and job drafts." />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:site_name" content="iNeeda.Work" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="iNeeda.Work | Find local registered pros & estimate prices" />
    <meta name="twitter:description" content="Central Pennsylvania's modern independent home service directory." />
    <meta name="twitter:image" content="/logo.png" />

    <!-- Structured Data (JSON-LD) for Local Service Business Index Directory -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "iNeeda.Work",
        "url": "https://ineeda.work",
        "description": "On-demand directory of verified, independent local home and lawn care service providers in Central PA.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://ineeda.work/directory?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body class="bg-slate-50 text-navy-900 font-sans antialiased selection:bg-gold-200 selection:text-navy-900">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
